<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #070812;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 45%, transparent 30%, rgba(0,0,0,0.55) 100%);
    }

    .glow-far {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,0.18) 0%, transparent 68%);
      filter: blur(8px);
    }

    .scene {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Floating arcade token — subtle, iconic */
    .token {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.22) 0%, transparent 28%),
        radial-gradient(circle at 50% 55%, #2a1f5e 0%, #120c28 55%, #070812 100%);
      border: 2px solid rgba(162,155,254,0.35);
      box-shadow:
        0 0 60px rgba(108,92,231,0.25),
        0 0 100px rgba(108,92,231,0.1),
        inset 0 -20px 40px rgba(0,0,0,0.5),
        inset 0 12px 24px rgba(162,155,254,0.08);
    }

    .token::before {
      content: '';
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px solid rgba(162,155,254,0.15);
    }

    .token::after {
      content: '▶';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      color: rgba(255,193,7,0.75);
      text-shadow: 0 0 24px rgba(255,193,7,0.4);
      transform: translateX(6px);
      font-family: system-ui, sans-serif;
    }

    .orbit {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      border: 1px solid rgba(108,92,231,0.12);
    }

    .orbit-2 {
      width: 400px;
      height: 400px;
      border-color: rgba(0,229,255,0.08);
      transform: rotate(18deg);
    }

    .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a29bfe;
      box-shadow: 0 0 12px #a29bfe;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .dot-2 {
      background: #ffc107;
      box-shadow: 0 0 12px #ffc107;
      top: auto;
      bottom: 24px;
      right: 40px;
      left: auto;
      transform: none;
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="glow-far"></div>
  <div class="scene">
    <div class="orbit orbit-2"><div class="dot dot-2"></div></div>
    <div class="orbit"><div class="dot"></div></div>
    <div class="token"></div>
  </div>
  <div class="vignette"></div>
  <div class="scanline"></div>
</body>
</html>
