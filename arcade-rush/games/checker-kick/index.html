<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#C8102E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Checker Kick — Elfmeter-Arcade im Browser. Kostenlos, kein Download. Kein offizielles Verbands- oder Turnierspiel.">
  <title>Checker Kick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div class="hud" id="hud">
      <div class="score-display">
        <span class="score-label">TORE</span>
        <span id="score">0</span>
      </div>
      <div class="hud-right">
        <div class="streak-display">
          <span>Serie</span>
          <span id="streak">–</span>
        </div>
        <div class="best-display">
          <span>🏆</span>
          <span id="best">0</span>
        </div>
      </div>
    </div>

    <div class="overlay active" id="menu-screen">
      <div class="logo-wrap">
        <div class="logo-checker" aria-hidden="true"></div>
        <h1>Checker Kick</h1>
        <p class="tagline">Šahovnica-Elfmeter · Kroatien-Fieber 🇭🇷</p>
      </div>
      <button class="btn-play" id="btn-play">
        <span class="btn-glow"></span>
        Tippen zum Start
      </button>
      <div class="menu-stats">
        <div class="stat"><span>Rekord</span><strong id="menu-best">0</strong></div>
        <div class="stat"><span>Spiele</span><strong id="menu-games">0</strong></div>
      </div>
      <p class="hint">Schaffst du 5 Tore in Folge? Tippe zum Schießen</p>
      <p class="legal-note">Kein offizielles Verbands- oder Turnierspiel.</p>
      <a href="../../index.html" class="back-arcade">← Alle Spiele</a>
    </div>

    <div class="overlay" id="ready-screen">
      <div class="ready-pulse"></div>
      <p class="ready-text">Bereit?</p>
      <p class="ready-sub">Tippe zum Schuss</p>
    </div>

    <div class="overlay" id="gameover-screen">
      <div class="go-card">
        <h2>Game Over</h2>
        <div class="go-score" id="go-score">0</div>
        <div class="go-medal" id="go-medal"></div>
        <div class="go-stats">
          <div><span>Tore</span><strong id="go-final">0</strong></div>
          <div><span>Rekord</span><strong id="go-best">0</strong></div>
          <div><span>Serie</span><strong id="go-streak">0</strong></div>
        </div>
        <div class="go-new-record" id="go-new-record">🎉 Neuer Rekord!</div>
        <button class="btn-play btn-retry" id="btn-retry">Nochmal</button>
        <a href="../../index.html" class="back-arcade go-home">← Alle Spiele</a>
      </div>
    </div>

    <button class="btn-sound" id="btn-sound" title="Sound">🔊</button>
  </div>

  <script src="../../js/analytics.js" onerror="void 0"></script>
  <script src="js/config.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
