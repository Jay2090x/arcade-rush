<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111010">
  <title>Zen Rings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="sand" aria-hidden="true"></canvas>

  <div class="tray-frame" id="tray-frame">
    <div class="spinner-hub" id="spinner-hub" aria-hidden="true"></div>
    <div class="spinner-arm" id="spinner-arm" aria-hidden="true"></div>
  </div>

  <div class="hud">
    <a class="btn-back" href="../../">← Zurück</a>
    <button type="button" class="btn-sound" id="btn-sound">🔊</button>
  </div>

  <div class="controls">
    <button type="button" class="tool active" data-mode="sand" id="tool-sand">⛰️ Sand</button>
    <button type="button" class="tool" data-mode="stick" id="tool-stick">🪄 Stab</button>
    <button type="button" class="btn-play" id="btn-play" onclick="SandApp.togglePlay(event)">▶ Play</button>
    <button type="button" class="tool" data-mode="reset" id="tool-reset">↺ Neu</button>
  </div>

  <p class="hint" id="hint">Sand aufhäufen → Play → Stab dreht Kreise wie im Video</p>

  <script src="../../js/analytics.js" onerror="void 0"></script>
  <script src="js/audio.js"></script>
  <script src="js/sand.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
