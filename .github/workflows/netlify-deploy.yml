name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        working-directory: arcade-rush
        env:
          URL: https://arcade-rush.netlify.app
        run: npm install && bash scripts/prepare-deploy.sh

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify-deploy@v3.0
        with:
          publish-dir: ./arcade-rush
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "GitHub Actions deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 09cd607d-5a09-4f72-b45f-56747e35937a