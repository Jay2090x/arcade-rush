name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        working-directory: arcade-rush
        env:
          URL: https://arcade-rush.netlify.app
        run: npm install && bash scripts/prepare-deploy.sh

      - name: Deploy to Netlify
        uses: netlify/actions/cli@v5.0.0
        with:
          args: deploy --prod --dir=.
          secrets: '["NETLIFY_AUTH_TOKEN"]'
        working-directory: arcade-rush
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 09cd607d-5a09-4f72-b45f-56747e35937a