name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site
        working-directory: arcade-rush
        env:
          URL: https://jay2090x.github.io/arcade-rush
        run: npm install && bash scripts/prepare-deploy.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: arcade-rush

      - id: deployment
        uses: actions/deploy-pages@v4